name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Rust format
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy --lib --features pyo3/extension-module -- -D warnings

      - name: Python lint
        run: uvx ruff@0.15.15 check .

      - name: Python format
        run: uvx ruff@0.15.15 format --check .

      - name: Build extension and run unittests
        run: |
          uv venv
          uv pip install python-calamine maturin
          uv run maturin develop --release
          uv run python -m unittest discover -s tests -v
